front:
  text: 補陀洛迦山傳題辭大元丘茲盛熙明述九州之山川具載於書傳山海之詭奇亦見於圖記其來尚矣謹按補陀洛迦者蓋梵名也華言小白華方廣華嚴言善財第二十八參觀自在菩薩與諸大菩薩圍繞説法蓋此地也然世無知者始自唐朝梵僧來覩神變而補陀洛迦山之名遂傳焉盤礴於東越之境窅芒乎巨浸之中石洞嵌巖林巒清邃有道者居之而阿蘭若兆興焉自非好奇探幽乘桴泛槎者罕能至也惟我皇元際天所覆均被化育梯航所及靈迹悉著至於茲山瞻拜相繼肸蠁昭答不可勝紀矣然圖志脫漏言辭庸謬四方不傳僕頃因謝病偶在海濱恭叩靈躅旁搜經籍首集自在之功德繼考洞宇之勝概若夫由心所見光景斯彰因緣有時廟塔興建具載於篇能遊目者不起於坐飛神於大方之外當知清淨光明廣大悲心與菩薩無二推惻隱之端躬行於日用之間非徒空言也儻欲南詢亦必問津於此而與善財同乘般若慈舟共達毗盧性境入海印之三昧證大悲之法門圓解脫之深因滿普賢之願海普令法界含生盡登菩提彼岸者豈虛謬哉
